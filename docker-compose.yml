services:
  db:
    image: postgres:15

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
     - "5432:5432"

    volumes:
      - db-data:/var/lib/postgresql/data

    networks:
      - app-network

  redis:
    image: redis:6

    ports:
     - "6379:6379"

    networks:
     - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge